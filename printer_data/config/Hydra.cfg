#............ Hydra System Motor Settings Z,Z1,Z2 ............

# Motor-4 Rear Center
[stepper_z]
step_pin: PF9
dir_pin: PF10
enable_pin: !PG2
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 2
endstop_pin: probe:z_virtual_endstop
homing_retract_dist: 0
position_max: 399
position_min: -30
homing_speed: 10

[tmc2209 stepper_z]
uart_pin: PF2
run_current: 0.8
interpolate: false
sense_resistor: 0.110

# Motor-5 Front Left 
[stepper_z1] 
step_pin: PC13
dir_pin: PF0
enable_pin: !PF1
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 2

[tmc2209 stepper_z1]
uart_pin: PE4
run_current: 0.8
interpolate: false
sense_resistor: 0.110

# motor-6 Front Right
[stepper_z2]
step_pin: PE2
dir_pin: PE3
enable_pin: !PD4
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 2

[tmc2209 stepper_z2]
uart_pin: PE1
run_current: 0.8
interpolate: false
sense_resistor: 0.110